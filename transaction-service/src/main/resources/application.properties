quarkus.http.port=8080

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:ledgerguard}
quarkus.datasource.password=${DB_PASSWORD:ledgerguard}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/ledgerguard}
quarkus.hibernate-orm.schema-management.strategy=validate
quarkus.flyway.migrate-at-start=true

kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
mp.messaging.outgoing.transactions-out.connector=smallrye-kafka
mp.messaging.outgoing.transactions-out.topic=transaction.requested.v1
mp.messaging.outgoing.transactions-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.transactions-out.acks=all

mp.messaging.incoming.fraud-decisions.connector=smallrye-kafka
mp.messaging.incoming.fraud-decisions.topic=fraud.decision.v1
mp.messaging.incoming.fraud-decisions.group.id=transaction-service
mp.messaging.incoming.fraud-decisions.auto.offset.reset=earliest
mp.messaging.incoming.fraud-decisions.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer

quarkus.smallrye-openapi.info-title=LedgerGuard Transaction API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Idempotent payment intake and transaction status API
quarkus.swagger-ui.always-include=true

quarkus.otel.sdk.disabled=${OTEL_DISABLED:true}
quarkus.micrometer.export.prometheus.enabled=true
