services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ledgerguard
      POSTGRES_USER: ledgerguard
      POSTGRES_PASSWORD: ledgerguard
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledgerguard"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redpanda:
    image: redpandadata/redpanda:v25.1.9
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 10

  transaction-service:
    build:
      context: ./transaction-service
      dockerfile: src/main/docker/Dockerfile.jvm
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/ledgerguard
      QUARKUS_DATASOURCE_USERNAME: ledgerguard
      QUARKUS_DATASOURCE_PASSWORD: ledgerguard
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  fraud-service:
    build:
      context: ./fraud-service
      dockerfile: src/main/docker/Dockerfile.jvm
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      QUARKUS_HTTP_PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      redpanda:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v3.4.1
    profiles: [observability]
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

volumes:
  postgres-data:
